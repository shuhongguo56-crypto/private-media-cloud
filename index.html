<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Private Media Cloud</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5eefc;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(59, 130, 246, .28), transparent 32rem),
        radial-gradient(circle at 85% 20%, rgba(139, 92, 246, .2), transparent 34rem),
        #020617;
    }
    main {
      width: min(92vw, 760px);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 32px;
      background: rgba(15, 23, 42, .68);
      box-shadow: 0 30px 120px rgba(0, 0, 0, .38);
      backdrop-filter: blur(24px);
    }
    p {
      color: #9fb2d8;
      line-height: 1.75;
    }
    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 86px);
      letter-spacing: -.08em;
    }
    button,
    a {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      color: #03111f;
      background: linear-gradient(135deg, #dbeafe, #8ec5ff);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .muted {
      color: #7c8aa8;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .ghost {
      color: #dbeafe;
      background: rgba(148, 163, 184, .12);
      border: 1px solid rgba(148, 163, 184, .18);
    }
    code {
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <main>
    <p class="muted">PRIVATE MEDIA CLOUD ENTRY</p>
    <h1>正在打开你的私人云盘</h1>
    <p id="message">正在读取当前公网入口。这里不保存你的文件、密码或分享内容。</p>
    <div class="actions">
      <button id="retry" type="button">重新连接</button>
      <a class="ghost" id="direct" href="#" hidden>直接打开当前地址</a>
    </div>
  </main>
  <script>
    const message = document.getElementById("message");
    const retry = document.getElementById("retry");
    const direct = document.getElementById("direct");

    function routeFor(origin) {
      const hash = window.location.hash || "";
      if (hash.startsWith("#/share/")) {
        return `${origin}/s/${encodeURIComponent(decodeURIComponent(hash.slice("#/share/".length)))}`;
      }
      if (hash === "#/camera-import") {
        return `${origin}/camera-import`;
      }
      return `${origin}/`;
    }

    async function openCloud() {
      message.textContent = "正在读取当前公网入口。这里不保存你的文件、密码或分享内容。";
      direct.hidden = true;
      try {
        const response = await fetch(`./gateway.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("gateway not found");
        const gateway = await response.json();
        const origin = String(gateway.public_origin || "").replace(/\/+$/, "");
        if (!/^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/i.test(origin) && !/^https:\/\//i.test(origin)) {
          throw new Error("invalid gateway");
        }
        const target = routeFor(origin);
        direct.href = target;
        direct.hidden = false;
        message.textContent = `已找到当前入口，正在跳转。最近同步时间：${gateway.published_at || "未知"}`;
        window.location.replace(target);
      } catch (error) {
        message.innerHTML = "私人云盘暂时离线。请确认电脑已开机、网站和 Cloudflare 隧道正在运行，然后点击重新连接。<br><br><code>GitHub Pages 只是固定入口，不保存你的资料。</code>";
      }
    }

    retry.addEventListener("click", openCloud);
    openCloud();
  </script>
</body>
</html>
